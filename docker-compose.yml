services:
  backend:
    build:
      context: ./backend
    container_name: pingly-backend
    ports:
      - "8000:8000"
    volumes:
      - pingly-data:/app/data
    environment:
      DATABASE_URL: sqlite:////app/data/pingly.db
      CORS_ORIGINS: http://localhost:5173,http://127.0.0.1:5173

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: http://localhost:8000
    container_name: pingly-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  pingly-data:
